services:
  db:
    image: postgis/postgis:16-3.4
    container_name: delivery-db
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/El_Salvador}
      POSTGRES_DB: ${POSTGRES_DB:-delivery}
      POSTGRES_USER: ${POSTGRES_USER:-delivery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-delivery}
    volumes:
      - delivery_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-delivery} -d ${POSTGRES_DB:-delivery}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
    image: delivery-backend:aws
    container_name: delivery-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/El_Salvador}
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-delivery}
      DB_USER: ${POSTGRES_USER:-delivery}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-delivery}
      DEV_SEED_ENABLED: ${DEV_SEED_ENABLED:-true}
      JWT_SECRET: ${JWT_SECRET:-delivery-aws-dev-secret-change-this-before-real-production-0123456789}
      JWT_ACCESS_TOKEN_MINUTES: ${JWT_ACCESS_TOKEN_MINUTES:-60}
      JWT_REFRESH_TOKEN_DAYS: ${JWT_REFRESH_TOKEN_DAYS:-14}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://32.199.155.252.sslip.io,http://32.199.155.252,http://localhost}
      FLYWAY_BASELINE_ON_MIGRATE: ${FLYWAY_BASELINE_ON_MIGRATE:-false}
      FLYWAY_BASELINE_VERSION: ${FLYWAY_BASELINE_VERSION:-0}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0 -Duser.timezone=America/El_Salvador}
      UPLOADS_ROOT_PATH: /app/uploads
    expose:
      - "8080"
    volumes:
      - delivery_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ../delivery_frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: delivery-frontend:aws
    container_name: delivery-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/El_Salvador}
      BACKEND_URL: http://backend:8080
      PORT: 80
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    container_name: delivery-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_etc:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot:latest
    container_name: delivery-certbot
    restart: unless-stopped
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  delivery_postgres_data:
  delivery_uploads:
  certbot_etc:
  certbot_www:
