server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://32.199.155.252.sslip.io$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 32.199.155.252.sslip.io;

    ssl_certificate /etc/letsencrypt/live/32.199.155.252.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/32.199.155.252.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
    }

    location /uploads/ {
        proxy_pass http://backend:8080/uploads/;
        proxy_http_version 1.1;
    }

    location /v3/api-docs {
        proxy_pass http://backend:8080/v3/api-docs;
        proxy_http_version 1.1;
    }

    location /swagger-ui {
        proxy_pass http://backend:8080/swagger-ui;
        proxy_http_version 1.1;
    }

    location /swagger-ui.html {
        proxy_pass http://backend:8080/swagger-ui.html;
        proxy_http_version 1.1;
    }

    # Backward-compatible aliases kept for older frontend calls.
    location /restaurants/ {
        proxy_pass http://backend:8080/restaurants/;
        proxy_http_version 1.1;
    }

    location /products/ {
        proxy_pass http://backend:8080/products/;
        proxy_http_version 1.1;
    }

    location /categories/ {
        proxy_pass http://backend:8080/categories/;
        proxy_http_version 1.1;
    }

    location /promotions/ {
        proxy_pass http://backend:8080/promotions/;
        proxy_http_version 1.1;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
    }
}
